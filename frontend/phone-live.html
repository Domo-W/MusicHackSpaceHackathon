<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>THE SHOW — Crowd Hype (LIVE)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@500;700;900&family=Chakra+Petch:wght@500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="app-styles.css" />
  <link rel="stylesheet" href="screens.css" />

  <!-- shell-specific UI (linear walkthrough): step dots, Next button, loading -->
  <style>
    .shell-steps { display:flex; gap:7px; justify-content:center; padding:10px 0 4px; }
    .shell-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.18); transition:.25s; }
    .shell-dot.on { background:var(--cyan,#00E5FF); box-shadow:0 0 10px var(--cyan,#00E5FF); transform:scale(1.25); }
    .shell-dot.done { background:rgba(255,255,255,.5); }
    .shell-deck { flex:1 1 auto; min-height:0; }
    .shell-foot { padding:12px 18px calc(14px + env(safe-area-inset-bottom)); }
    .shell-next {
      width:100%; border:0; border-radius:16px; padding:18px;
      font:700 16px/1 'Space Grotesk', system-ui, sans-serif; letter-spacing:.06em;
      color:#06121a; cursor:pointer;
      background:linear-gradient(90deg, var(--cyan,#00E5FF), #7ef0ff);
      box-shadow:0 0 24px rgba(0,229,255,.45);
    }
    .shell-next:disabled { background:rgba(255,255,255,.12); color:rgba(255,255,255,.5); box-shadow:none; cursor:default; }
    .shell-next:active:not(:disabled) { transform:translateY(1px); }

    .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; height:100%; gap:10px; }
    .loading-screen .screen-title { margin:0; }
    .ls-orb { position:relative; width:120px; height:120px; margin:18px 0; }
    .ls-orb span {
      position:absolute; inset:0; border-radius:50%; border:3px solid transparent;
      border-top-color:var(--cyan,#00E5FF); border-right-color:var(--magenta,#FF1A8C);
      animation:lsspin 1.1s linear infinite;
    }
    .ls-orb span:nth-child(2) { inset:14px; animation-duration:1.6s; animation-direction:reverse; opacity:.7; }
    .ls-orb span:nth-child(3) { inset:30px; animation-duration:.9s; opacity:.5; }
    @keyframes lsspin { to { transform:rotate(360deg); } }
    .ls-next { display:flex; flex-direction:column; gap:4px; margin-top:8px; }
    .ls-next-k { font:700 11px/1 'JetBrains Mono', monospace; letter-spacing:.22em; color:rgba(255,255,255,.45); }
    .ls-next-name { font:900 30px/1 'Archivo','Space Grotesk',sans-serif; color:var(--cyan,#00E5FF); text-shadow:0 0 18px rgba(0,229,255,.5); }
    .ls-next-genre { font:700 14px/1 'Space Grotesk',sans-serif; letter-spacing:.14em; color:var(--magenta,#FF1A8C); }
    .ls-next-line { font:italic 500 15px/1.3 'Space Grotesk',sans-serif; color:rgba(255,255,255,.8); margin-top:6px; max-width:300px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0A0A0F"/>
      <circle cx="50" cy="50" r="26" fill="none" stroke="#00E5FF" stroke-width="5" stroke-dasharray="100 64" stroke-linecap="round" transform="rotate(-90 50 50)"/>
      <circle cx="50" cy="50" r="13" fill="#FF1A8C"/>
    </svg>
  </template>

  <!-- React + Babel (same CDN + integrity as the partner's prototype) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- LIVE transport + NETWORKED seams (replace crowd-sim.js / tug-sim.js).
       net.js MUST load first; the net-* seams define window.CrowdSim /
       window.Tug BEFORE app.jsx runs, so the UI binds to the wire. -->
  <script src="net.js"></script>
  <script src="net-crowd.js"></script>
  <script src="net-tug.js"></script>

  <!-- partner components (UNCHANGED) + OUR linear shell (replaces app.jsx).
       phone-shell.jsx sequences the partner's screens like a form instead of
       the swipeable-tab deck. -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="shared.jsx?v=9"></script>
  <script type="text/babel" src="screen-vibe.jsx?v=7"></script>
  <script type="text/babel" src="screen-texture.jsx?v=7"></script>
  <script type="text/babel" src="screen-tug.jsx?v=7"></script>
  <script type="text/babel" src="screen-intent.jsx?v=12"></script>
  <script type="text/babel" src="phone-shell.jsx?v=1"></script>

  <!-- phone glue: join (NAME) + answer (INTENT). Loaded LAST.
       Plain vanilla JS (no Babel) — net.js/net-crowd.js are plain scripts
       above it so its CrowdSim.addWord patch applies immediately; the
       IntentSink wrap retries until screen-intent.jsx's Babel module runs. -->
  <script src="phone-net.js"></script>
</body>
</html>
